# Font configuration
font_family family="Monaspace Argon Var" features="+calt +liga +ss01 +ss02 +ss03 -ss04 +ss05 -ss06 +ss07 -ss08 +ss09" wght=500
font_size 15.0

# Line height (1.50 in WezTerm)
modify_font cell_height 150%

# Window padding: left=8, top=8, right=8, bottom=0
window_padding_width 8 8 8 0

# Close kitty completely when last window is closed (macOS)
macos_quit_when_last_window_closed yes

# Color scheme - Tomorrow Night (Gogh)
include themes/Tomorrow_Night.conf

# Disable tab bar (WezTerm: enable_tab_bar = false)
tab_bar_style hidden

# Key mappings for tmux integration

# Option+Left/Right: word navigation (send Alt+b/f)
# These work in both tmux and regular shell
map opt+left send_text all \x1bb
map opt+right send_text all \x1bf

# Cmd+V: native paste (use tmux prefix+P for tmux paste)
map cmd+v paste_from_clipboard

# Cmd+C: copy to clipboard and primary selection
map cmd+c copy_and_clear_or_interrupt

# Cursor: block shape, prevent shell integration from overriding to beam
cursor_shape block
shell_integration no-cursor
