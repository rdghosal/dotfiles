# -------------------------------- Plugins ---------------------------------- #

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Install
run '~/.tmux/plugins/tpm/tpm'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# ---------------------------------- UI ------------------------------------- #

# Use xterm-256color (has italics, no status line capabilities that cause bleeding)
set -g default-terminal "xterm-256color"

# Override tmux-sensible's broken terminal-overrides
set -g terminal-overrides "xterm-256color:Tc,sitm=\E[3m:ritm=\E[23m"

# Extended keys configuration for Pi compatibility
set -g extended-keys on
set -g extended-keys-format csi-u
set -g focus-events on
set -g alternate-screen on

set -g status-justify left
set-option -g status-style "bg=black,fg=cyan"
set-option -g status-left "#[fg=red,bright] > "
set-option -g status-right-length 50
set-option -g status-right "#[fg=white] %H:%M %Y-%m-%d [#H]"
set-window-option -g window-status-current-style fg=green
set -g pane-border-style fg=white
set -g pane-active-border-style bg=default,fg=white

# ----------------------------- Key Bindings -------------------------------- #

unbind C-b
set-option -g prefix C-a
set-option -g repeat-time 0
set -g mouse on

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Reload settings
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Open current directory
bind o run-shell "open #{pane_current_path}"
bind -r \/ kill-pane -a
bind -r . confirm kill-window

# Split panes with \ and -
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Jump windows
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

# Word navigation with Option+arrow (pass through to shell)
bind-key -n M-Left  send-keys "\eb"
bind-key -n M-Right send-keys "\ef"

# Resize pane
bind -r C-k resize-pane -U 5
bind -r C-j resize-pane -D 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5
